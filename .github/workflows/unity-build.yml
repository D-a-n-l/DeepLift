name: Unity Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, commit SHA or tag
        required: true
        default: main
      targetPlatform:
        description: Unity target platform
        required: true
        default: Android
        type: choice
        options:
          - Android
          - WebGL
          - StandaloneWindows64
      usePreBuild:
        description: Run .github/scripts/pre-build.sh
        required: true
        default: false
        type: boolean
      useUpload:
        description: Run external upload script after GitHub artifact upload
        required: true
        default: false
        type: boolean
      uploadTarget:
        description: External upload destination for .github/scripts/upload.sh
        required: true
        default: __none__
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ inputs.targetPlatform }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ inputs.targetPlatform }}-
            Library-${{ runner.os }}-

      - name: Run pre-build script
        shell: bash
        env:
          TARGET_PLATFORM: ${{ inputs.targetPlatform }}
          BUILD_REF: ${{ inputs.ref }}
        run: |
          if [ "${{ inputs.usePreBuild }}" != "true" ]; then
            echo "Pre-build script disabled."
            exit 0
          fi

          SCRIPT=".github/scripts/pre-build.sh"
          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
            "$SCRIPT"
          else
            echo "Pre-build script not found: $SCRIPT"
            exit 1
          fi

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: ${{ inputs.targetPlatform }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.targetPlatform }}-${{ github.run_number }}
          path: build/${{ inputs.targetPlatform }}
          if-no-files-found: error

      - name: Run upload script
        shell: bash
        env:
          TARGET_PLATFORM: ${{ inputs.targetPlatform }}
          BUILD_REF: ${{ inputs.ref }}
          BUILD_PATH: build/${{ inputs.targetPlatform }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          UPLOAD_TARGET: ${{ inputs.uploadTarget }}
        run: |
          if [ "${{ inputs.useUpload }}" != "true" ] || [ "${{ inputs.uploadTarget }}" = "__none__" ]; then
            echo "External upload script disabled. GitHub artifact upload has already completed."
            exit 0
          fi

          SCRIPT=".github/scripts/upload.sh"
          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
            "$SCRIPT"
          else
            echo "Upload script not found: $SCRIPT"
            exit 1
          fi