name: Unity Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, commit SHA or tag
        required: true
        default: main
      targetPlatform:
        description: Unity target platform
        required: true
        default: Android
        type: choice
        options:
          - Android
          - WebGL
          - StandaloneWindows64
      preBuildScript:
        description: Optional pre-build script
        required: true
        default: __none__
        type: choice
        options:
          - __none__
          - .github/scripts/pre-build-Android.sh
          - .github/scripts/pre-build-WebGL.sh
          - .github/scripts/pre-build-StandaloneWindows64.sh
      uploadScript:
        description: Optional upload script
        required: true
        default: __none__
        type: choice
        options:
          - __none__
          - .github/scripts/upload-Android.sh
          - .github/scripts/upload-WebGL.sh
          - .github/scripts/upload-StandaloneWindows64.sh

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ inputs.targetPlatform }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ inputs.targetPlatform }}-
            Library-${{ runner.os }}-

      - name: Run pre-build script
        shell: bash
        env:
          TARGET_PLATFORM: ${{ inputs.targetPlatform }}
          BUILD_REF: ${{ inputs.ref }}
        run: |
          SCRIPT="${{ inputs.preBuildScript }}"
          if [ "$SCRIPT" = "__none__" ]; then
            echo "Pre-build script disabled."
            exit 0
          fi

          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
            "$SCRIPT"
          else
            echo "Pre-build script not found: $SCRIPT"
            exit 1
          fi

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          targetPlatform: ${{ inputs.targetPlatform }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.targetPlatform }}-${{ github.run_number }}
          path: build/${{ inputs.targetPlatform }}
          if-no-files-found: error

      - name: Run upload script
        shell: bash
        env:
          TARGET_PLATFORM: ${{ inputs.targetPlatform }}
          BUILD_REF: ${{ inputs.ref }}
          BUILD_PATH: build/${{ inputs.targetPlatform }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          SCRIPT="${{ inputs.uploadScript }}"
          if [ "$SCRIPT" = "__none__" ]; then
            echo "Upload script disabled."
            exit 0
          fi

          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
            "$SCRIPT"
          else
            echo "Upload script not found: $SCRIPT"
            exit 1
          fi